name: Build Windows Installer

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          # Assuming you run this from the defender folder or set working-directory
          pip install -r requirements.txt

      - name: Build Executable with PyInstaller
        run: |
          pyinstaller --noconfirm --onedir --windowed --name "InterludeDefender" main.py

      - name: Compile Inno Setup Script
        run: |
          choco install innosetup -y
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: InterludeDefender-Installer
          path: Output/InterludeDefender_Setup.exe

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          files: Output/InterludeDefender_Setup.exe
